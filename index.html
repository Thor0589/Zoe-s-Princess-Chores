<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe's Princess Chores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); background-color: #fbcfe8; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
      100% { transform: scale(1); }
    }
    .animating-chore {
      animation: pop 0.8s ease-out;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-200 via-purple-100 to-pink-200 p-6 flex flex-col items-center justify-center font-sans overflow-x-hidden overflow-y-auto">

  <!-- Confetti Canvas -->
  <canvas id="confettiCanvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

  <div class="max-w-md w-full bg-white/90 backdrop-blur-sm rounded-[2.5rem] shadow-2xl border-4 border-pink-300 p-8 relative z-10">
    
    <!-- Header Section -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-tr from-yellow-200 to-yellow-400 rounded-full mb-4 shadow-lg ring-4 ring-pink-100">
        <i data-lucide="crown" class="w-10 h-10 text-yellow-600"></i>
      </div>
      <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600 tracking-tight">
        Zoe's Princess Chores
      </h1>
      <p class="text-pink-400 font-medium mt-2">Let's make today magical! ✨</p>

      <div class="mt-4 flex items-center justify-center gap-3 flex-wrap">
        <div id="audioStatusBadge" class="inline-flex items-center px-4 py-2 bg-pink-50 text-pink-500 rounded-full border border-pink-200 shadow-sm text-sm font-bold">
          <span id="audioStatusDot" class="w-2.5 h-2.5 rounded-full bg-pink-300 mr-2 animate-pulse"></span>
          <span id="audioStatusText">Loading voices...</span>
        </div>
        <label class="cursor-pointer inline-flex items-center px-4 py-2 bg-white text-pink-500 rounded-full border border-pink-200 hover:bg-pink-100 transition-colors shadow-sm text-sm font-bold">
          <i data-lucide="music" class="w-4 h-4 mr-2"></i>
          <span id="audioBtnText">Replace Voice Files</span>
          <input type="file" multiple accept="audio/mpeg, audio/mp3" class="hidden" onchange="handleAudioFiles(event)">
        </label>
      </div>
    </div>

    <!-- Chores List -->
    <div id="choresList" class="space-y-4">
      <!-- Injected via JavaScript -->
    </div>

    <!-- Footer / Reset Action -->
    <div id="footer" class="mt-10 text-center">
      <!-- Injected via JavaScript -->
    </div>

  </div>

  <script>
    // State
    const initialChores = [
      { id: 1, text: "Clean up toys", pastTense: "You cleaned up your toys! Good job, Zoe!", audioFile: "toys.mp3", icon: "🧸", completed: false },
      { id: 2, text: "Pick up your dirty clothes", pastTense: "You picked up your dirty clothes! Good job, Zoe!", audioFile: "clothes.mp3", icon: "👗", completed: false },
      { id: 3, text: "Play Zoe's Princess Academy 15 min", pastTense: "You played Zoe's Princess Academy for fifteen minutes! Good job, Zoe!", audioFile: "academy.mp3", icon: "🏰", completed: false },
      { id: 4, text: "Listen to mommy and daddy", pastTense: "You listened to mommy and daddy! Good job, Zoe!", audioFile: "listening.mp3", icon: "💖", completed: false },
      { id: 5, text: "Make your bed", pastTense: "You made your bed! Good job, Zoe!", audioFile: "bed.mp3", icon: "🛏️", completed: false }
    ];

    let chores = JSON.parse(JSON.stringify(initialChores));
    let animatingId = null;
    let customAudioFiles = {};
    let localAudioReadyCount = 0;
    const localAudioSources = {};
    const audioFolder = 'Audio Assets';
    const totalLocalAudioFiles = initialChores.length;

    function updateAudioStatus(readyCount, sourceLabel) {
      const statusText = document.getElementById('audioStatusText');
      const statusDot = document.getElementById('audioStatusDot');
      const btnText = document.getElementById('audioBtnText');
      const customCount = Object.keys(customAudioFiles).length;

      if (customCount > 0) {
        if (statusText) {
          statusText.innerText = customCount >= totalLocalAudioFiles
            ? 'Custom voices ready'
            : `Custom voices ${customCount}/${totalLocalAudioFiles} loaded`;
        }

        if (statusDot) {
          statusDot.className = customCount >= totalLocalAudioFiles
            ? 'w-2.5 h-2.5 rounded-full bg-emerald-400 mr-2'
            : 'w-2.5 h-2.5 rounded-full bg-pink-300 mr-2 animate-pulse';
        }

        if (btnText) {
          btnText.innerText = customCount >= totalLocalAudioFiles ? 'Voices Loaded!' : 'Add More Voice Files';
        }

        return;
      }

      if (statusText) {
        if (readyCount >= totalLocalAudioFiles) {
          statusText.innerText = sourceLabel ? `${sourceLabel} ready` : 'Local voices ready';
        } else {
          statusText.innerText = `Loading voices ${readyCount}/${totalLocalAudioFiles}`;
        }
      }

      if (statusDot) {
        statusDot.className = readyCount >= totalLocalAudioFiles
          ? 'w-2.5 h-2.5 rounded-full bg-emerald-400 mr-2'
          : 'w-2.5 h-2.5 rounded-full bg-pink-300 mr-2 animate-pulse';
      }

      if (btnText && readyCount >= totalLocalAudioFiles) {
        btnText.innerText = 'Replace Voice Files';
      }
    }

    function getLocalAudioUrl(chore) {
      return customAudioFiles[chore.audioFile] || localAudioSources[chore.id] || `${audioFolder}/${chore.audioFile}`;
    }

    function preloadLocalAudio() {
      localAudioReadyCount = 0;

      initialChores.forEach(chore => {
        const sourceUrl = `${audioFolder}/${chore.audioFile}`;
        localAudioSources[chore.id] = sourceUrl;

        const audio = new Audio();
        audio.preload = 'auto';
        audio.src = sourceUrl;

        const onReady = () => {
          localAudioReadyCount += 1;
          updateAudioStatus(localAudioReadyCount, 'Local voices');
        };

        audio.addEventListener('loadeddata', onReady, { once: true });
        audio.addEventListener('error', () => {
          updateAudioStatus(localAudioReadyCount, 'Local voices');
        }, { once: true });
        audio.load();
      });

      updateAudioStatus(localAudioReadyCount, 'Local voices');
    }

    function handleAudioFiles(event) {
      const files = event.target.files;
      for (let i = 0; i < files.length; i++) {
        customAudioFiles[files[i].name] = URL.createObjectURL(files[i]);
      }

      updateAudioStatus(localAudioReadyCount, 'Local voices');
    }

    // Confetti Animation
    function fireConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      const colors = ['#FFC0CB', '#FFB6C1', '#FF69B4', '#FF1493', '#DB7093', '#FFD700', '#FFFACD'];

      for (let i = 0; i < 80; i++) {
        particles.push({
          x: canvas.width / 2 + (Math.random() * 100 - 50),
          y: canvas.height / 2,
          r: Math.random() * 8 + 3,
          dx: Math.random() * 14 - 7,
          dy: Math.random() * -14 - 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          tilt: Math.floor(Math.random() * 10) - 10,
          tiltAngleInc: (Math.random() * 0.07) + 0.05,
          tiltAngle: 0
        });
      }

      let animationFrame;
      const renderFrame = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = false;
        
        particles.forEach(p => {
          p.tiltAngle += p.tiltAngleInc;
          p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
          p.x += Math.sin(p.tiltAngle) * 2;
          p.dy += 0.2; // Gravity
          p.y += p.dy;
          p.x += p.dx;

          if (p.y <= canvas.height) active = true;

          ctx.beginPath();
          ctx.lineWidth = p.r;
          ctx.strokeStyle = p.color;
          ctx.moveTo(p.x + p.tilt + p.r, p.y);
          ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
          ctx.stroke();
        });

        if (active) {
          animationFrame = requestAnimationFrame(renderFrame);
        }
      };
      renderFrame();

      setTimeout(() => {
        cancelAnimationFrame(animationFrame);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 4000);
    }

    // Audio Playback
    function playGoodJobAudio(id, pastTenseText) {
      const chore = chores.find(c => c.id === id);
      const url = chore ? getLocalAudioUrl(chore) : null;
      if (url) {
        const audio = new Audio(url);
        audio.play().catch(e => console.error("Audio block bypassed:", e));
      } else {
        // Offline/Fallback Synthesis
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(pastTenseText);
        utterance.rate = 0.85;
        utterance.pitch = 1.3;
        const voices = synth.getVoices();
        const femaleVoice = voices.find(v => v.name.includes("Female") || v.name.includes("Zira") || v.name.includes("Samantha") || v.name.includes("Karen"));
        if (femaleVoice) utterance.voice = femaleVoice;
        synth.speak(utterance);
      }
    }

    // Core Logic & Render
    function toggleChore(id) {
      const choreIndex = chores.findIndex(c => c.id === id);
      if (choreIndex === -1) return;

      const isNowCompleted = !chores[choreIndex].completed;
      chores[choreIndex].completed = isNowCompleted;

      if (isNowCompleted) {
        animatingId = id;
        setTimeout(() => {
          animatingId = null;
          renderApp();
        }, 800);
        playGoodJobAudio(id, chores[choreIndex].pastTense);
        fireConfetti();
      }

      renderApp();
    }

    function resetChores() {
      chores = JSON.parse(JSON.stringify(initialChores));
      renderApp();
    }

    function renderApp() {
      const listContainer = document.getElementById('choresList');
      const footerContainer = document.getElementById('footer');
      const allCompleted = chores.every(c => c.completed);

      // Render Chores
      listContainer.innerHTML = chores.map(chore => `
        <div
          onclick="toggleChore(${chore.id})"
          class="flex items-center p-5 rounded-2xl cursor-pointer transition-all duration-300 ease-out transform select-none
            ${animatingId === chore.id ? 'animating-chore bg-pink-200 shadow-xl' : ''}
            ${chore.completed 
              ? 'bg-pink-50 border-2 border-pink-200 opacity-80 scale-[0.98]' 
              : 'bg-white border-2 border-pink-100 shadow-sm hover:-translate-y-1 hover:shadow-md hover:border-pink-300'
            }"
        >
          <div class="text-3xl mr-4 bg-pink-50 w-12 h-12 flex items-center justify-center rounded-full">
            ${chore.icon}
          </div>
          
          <div class="flex-1 text-lg md:text-xl font-bold transition-colors ${chore.completed ? 'text-pink-300 line-through' : 'text-purple-800'}">
            ${chore.text}
          </div>
          
          <div class="ml-4 transition-transform duration-500 ${chore.completed ? 'scale-110' : 'scale-100'}">
            ${chore.completed 
              ? '<i data-lucide="check-circle-2" class="w-9 h-9 text-pink-500" fill="#fbcfe8"></i>' 
              : '<i data-lucide="circle" class="w-9 h-9 text-pink-200 hover:text-pink-300"></i>'
            }
          </div>
        </div>
      `).join('');

      // Render Footer
      let footerHtml = '';
      if (allCompleted) {
        footerHtml += `
          <div class="animate-bounce inline-flex items-center text-pink-500 font-bold text-xl mb-4">
            <i data-lucide="wand-2" class="w-6 h-6 mr-2"></i> You did it, Princess Zoe!
          </div>
        `;
      }
      footerHtml += `
        <button
          onclick="resetChores()"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-pink-400 to-purple-400 text-white font-bold text-lg shadow-lg hover:from-pink-500 hover:to-purple-500 transition-all active:scale-95"
        >
          Start a New Magical Day
        </button>
      `;
      footerContainer.innerHTML = footerHtml;

      // Re-initialize Lucide Icons for newly injected HTML
      lucide.createIcons();
    }

    // Boot
    window.onload = () => {
      renderApp();
      preloadLocalAudio();
    };
  </script>
</body>
</html>
